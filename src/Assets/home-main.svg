<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#12182B"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C41E3A"/>
      <stop offset="100%" stop-color="#8B1528"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- PCB Board -->
  <rect x="50" y="50" width="400" height="400" rx="20" fill="url(#boardGrad)" stroke="#C41E3A" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Animated electricity traces -->
  <g filter="url(#glow2)">
    <path d="M80 150 H160 V200 H240 V250 H340 V300 H420" stroke="#C41E3A" stroke-width="2" fill="none" stroke-opacity="0.6">
      <animate attributeName="stroke-dasharray" values="0 500;500 0" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M80 300 H140 V350 H220 V300 H300 V250 H420" stroke="#C9A84C" stroke-width="1.5" fill="none" stroke-opacity="0.5">
      <animate attributeName="stroke-dasharray" values="0 600;600 0" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M250 80 V130 H180 V170" stroke="#C41E3A" stroke-width="1.5" fill="none" stroke-opacity="0.4">
      <animate attributeName="stroke-dasharray" values="0 200;200 0" dur="2.5s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path d="M350 80 V120 H400 V170" stroke="#C9A84C" stroke-width="1" fill="none" stroke-opacity="0.4">
      <animate attributeName="stroke-dasharray" values="0 200;200 0" dur="2.5s" begin="0.3s" repeatCount="indefinite"/>
    </path>
    <path d="M100 400 H160 V370 H240 V420" stroke="#C41E3A" stroke-width="1" fill="none" stroke-opacity="0.3">
      <animate attributeName="stroke-dasharray" values="0 250;250 0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M340 370 H380 V420" stroke="#C9A84C" stroke-width="1" fill="none" stroke-opacity="0.3">
      <animate attributeName="stroke-dasharray" values="0 150;150 0" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Central microcontroller chip -->
  <rect x="165" y="175" width="170" height="120" rx="8" fill="#12182B" stroke="#C41E3A" stroke-width="2.5"/>
  <rect x="175" y="185" width="150" height="100" rx="4" fill="#0A0E1A" stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Chip text -->
  <text x="250" y="225" text-anchor="middle" fill="#C41E3A" font-family="monospace" font-size="18" font-weight="bold" filter="url(#glow2)">ESP32</text>
  <text x="250" y="248" text-anchor="middle" fill="#C9A84C" font-family="monospace" font-size="11">WROOM-32</text>
  <text x="250" y="268" text-anchor="middle" fill="#666" font-family="monospace" font-size="8">Dual Core 240MHz</text>

  <!-- Chip pins left with pulse -->
  <g stroke="#C9A84C" stroke-width="2">
    <line x1="165" y1="195" x2="140" y2="195"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></line>
    <line x1="165" y1="215" x2="140" y2="215"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/></line>
    <line x1="165" y1="235" x2="140" y2="235"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/></line>
    <line x1="165" y1="255" x2="140" y2="255"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="0.9s" repeatCount="indefinite"/></line>
    <line x1="165" y1="275" x2="140" y2="275"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="1.2s" repeatCount="indefinite"/></line>
  </g>

  <!-- Chip pins right with pulse -->
  <g stroke="#C9A84C" stroke-width="2">
    <line x1="335" y1="195" x2="360" y2="195"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="0.2s" repeatCount="indefinite"/></line>
    <line x1="335" y1="215" x2="360" y2="215"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/></line>
    <line x1="335" y1="235" x2="360" y2="235"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="0.8s" repeatCount="indefinite"/></line>
    <line x1="335" y1="255" x2="360" y2="255"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="1.1s" repeatCount="indefinite"/></line>
    <line x1="335" y1="275" x2="360" y2="275"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" begin="1.4s" repeatCount="indefinite"/></line>
  </g>

  <!-- Chip pins top -->
  <g stroke="#C9A84C" stroke-width="2">
    <line x1="195" y1="175" x2="195" y2="155"/>
    <line x1="220" y1="175" x2="220" y2="155"/>
    <line x1="250" y1="175" x2="250" y2="155"/>
    <line x1="280" y1="175" x2="280" y2="155"/>
    <line x1="305" y1="175" x2="305" y2="155"/>
  </g>

  <!-- WiFi waves (top right) -->
  <g transform="translate(380, 90)" filter="url(#glow1)">
    <path d="M-20 25 Q0 -5, 20 25" stroke="#C41E3A" stroke-width="2" fill="none" opacity="0.4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M-14 22 Q0 2, 14 22" stroke="#C41E3A" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </path>
    <path d="M-8 19 Q0 9, 8 19" stroke="#C41E3A" stroke-width="2" fill="none" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="22" r="3" fill="#C41E3A"/>
    <text x="0" y="40" text-anchor="middle" fill="#C41E3A" font-family="monospace" font-size="9">WiFi</text>
  </g>

  <!-- LoRa antenna (top left) -->
  <g transform="translate(100, 80)" filter="url(#glow2)">
    <line x1="0" y1="50" x2="0" y2="12" stroke="#C9A84C" stroke-width="2"/>
    <circle cx="0" cy="10" r="5" stroke="#C9A84C" stroke-width="1.5" fill="none">
      <animate attributeName="r" values="4;7;4" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <path d="M-12 24 Q0 4, 12 24" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M-18 32 Q0 4, 18 32" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.3"/>
    <text x="0" y="66" text-anchor="middle" fill="#C9A84C" font-family="monospace" font-size="9">LoRa</text>
  </g>

  <!-- Temperature sensor (bottom left) -->
  <rect x="80" y="340" width="70" height="55" rx="6" fill="#12182B" stroke="#C41E3A" stroke-width="1.5"/>
  <text x="115" y="358" text-anchor="middle" fill="#C41E3A" font-family="monospace" font-size="9">SENSOR</text>
  <text x="115" y="378" text-anchor="middle" fill="#C9A84C" font-family="monospace" font-size="14" filter="url(#glow2)">
    23.5°C
    <animate attributeName="fill-opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- LED indicators with glow -->
  <g filter="url(#glow1)">
    <circle cx="370" cy="360" r="6" fill="#C41E3A">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="395" cy="360" r="6" fill="#C9A84C">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="360" r="6" fill="#22c55e">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="395" y="385" text-anchor="middle" fill="#666" font-family="monospace" font-size="8">STATUS</text>

  <!-- Small SMD components -->
  <rect x="370" y="260" width="22" height="10" rx="2" fill="#1a1a2e" stroke="#C41E3A" stroke-width="0.8"/>
  <rect x="400" y="260" width="22" height="10" rx="2" fill="#1a1a2e" stroke="#C9A84C" stroke-width="0.8"/>
  <rect x="370" y="280" width="22" height="10" rx="2" fill="#1a1a2e" stroke="#C41E3A" stroke-width="0.8"/>
  <rect x="400" y="280" width="22" height="10" rx="2" fill="#1a1a2e" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- RFID module (bottom right) -->
  <g transform="translate(360, 400)">
    <rect width="55" height="32" rx="5" fill="#12182B" stroke="#C41E3A" stroke-width="1"/>
    <path d="M15 16 Q28 4, 40 16" stroke="#C41E3A" stroke-width="1" fill="none">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M20 16 Q28 9, 35 16" stroke="#C41E3A" stroke-width="1" fill="none">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <circle cx="28" cy="18" r="2" fill="#C41E3A"/>
    <text x="28" y="10" text-anchor="middle" fill="#666" font-family="monospace" font-size="7">RFID</text>
  </g>

  <!-- Electricity spark effect at junctions -->
  <circle cx="160" cy="200" r="3" fill="#C41E3A" filter="url(#glow1)">
    <animate attributeName="r" values="1;4;1" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="300" r="3" fill="#C9A84C" filter="url(#glow1)">
    <animate attributeName="r" values="1;4;1" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="250" r="2" fill="#C41E3A" filter="url(#glow2)">
    <animate attributeName="r" values="1;3;1" dur="0.8s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="0.8s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner mounting holes -->
  <circle cx="70" cy="70" r="6" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="430" cy="70" r="6" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="70" cy="430" r="6" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="430" cy="430" r="6" fill="none" stroke="#333" stroke-width="1.5"/>
</svg>
